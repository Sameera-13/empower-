<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="50%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f9a8d4"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
  </defs>
  <!-- Venus circle -->
  <circle cx="32" cy="24" r="18" fill="none" stroke="url(#g1)" stroke-width="5.5"/>
  <!-- Venus vertical line -->
  <rect x="29.25" y="41" width="5.5" height="14" rx="2.5" fill="url(#g1)"/>
  <!-- Venus horizontal cross -->
  <rect x="23" y="48" width="18" height="5.5" rx="2.5" fill="url(#g1)"/>
  <!-- Raised fist -->
  <g fill="url(#g2)">
    <!-- Wrist -->
    <rect x="28" y="29" width="8" height="8" rx="2"/>
    <!-- Palm -->
    <rect x="26" y="18" width="12" height="13" rx="3"/>
    <!-- Thumb -->
    <rect x="23" y="22" width="5" height="8" rx="2.5"/>
    <!-- Fingers -->
    <rect x="27" y="12" width="4" height="9" rx="2"/>
    <rect x="32" y="11" width="4" height="10" rx="2"/>
    <rect x="37" y="13" width="4" height="8" rx="2"/>
    <!-- Finger gaps (knuckle lines) -->
    <rect x="27" y="17.5" width="14" height="1.2" rx="0.6" fill="#db2777" opacity="0.3"/>
  </g>
</svg>